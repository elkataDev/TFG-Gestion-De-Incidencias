# --- Configuración de MySQL ---
# CAMBIA 'nombre_de_tu_base_de_datos' por el nombre real de tu esquema en MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/sistema_incidencias?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# CAMBIA esto por tu usuario de MySQL (usualmente 'root')
spring.datasource.username=root

# CAMBIA esto por tu contraseńa de MySQL
spring.datasource.password=1234

# Driver específico para MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Dialecto para que Hibernate hable correctamente con MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Mantiene la estructura de tablas actualizada (útil para desarrollo)
spring.jpa.hibernate.ddl-auto=update

# --- Configuración del Servidor ---
server.port=5555

# --- Configuración de Seguridad JWT (Sin cambios) ---
security.jwt.secret-key=VGhpcyBJcyBBIFZlcnkgU2VjcmV0IEtleSBUaGF0IFNob3VsZCBCZSBMb25nIEVub3VnaCAyNTY=
security.jwt.expiration-time=86400000

# NOTA: La consola de H2 no funciona con MySQL, por lo que se ha eliminado esa línea.